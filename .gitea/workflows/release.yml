name: Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Build
        run: ./gradlew shadowJar

      - name: Upload JAR to release
        run: |
          curl -sf -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @build/libs/kiss-shot-acerola.jar \
            "${{ gitea.server_url }}/api/v1/repos/${{ gitea.repository }}/releases/${{ github.event.release.id }}/assets?name=kiss-shot-acerola.jar"
